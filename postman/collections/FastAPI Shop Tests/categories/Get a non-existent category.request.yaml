$kind: http-request
name: Get a non-existent category
url: "{{base_url}}/api/categories/9999"
method: GET
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 404\", function () {\r

      \    pm.response.to.have.status(404);\r

      });\r

      \r

      pm.test(\"Error message is correct\", function () {\r

      \    var jsonData = pm.response.json();\r

      \    pm.expect(jsonData.detail).to.include(\"not found\");\r

      });"
    language: text/javascript
order: 4394314024879800
