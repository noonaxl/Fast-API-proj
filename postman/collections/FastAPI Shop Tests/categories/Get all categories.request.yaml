$kind: http-request
url: "{{base_url}}/api/categories"
method: GET
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Response is array\", function () {\r

      \    var jsonData = pm.response.json();\r

      \    pm.expect(jsonData).to.be.an('array');\r

      });\r

      \r

      pm.test(\"Categories have required fields\", function () {\r

      \    var jsonData = pm.response.json();\r

      \    pm.expect(jsonData[0]).to.have.property('id');\r

      \    pm.expect(jsonData[0]).to.have.property('name');\r

      \    pm.expect(jsonData[0]).to.have.property('slug');\r

      });\r

      \r

      // Сохраняем ID первой категории для других запросов\r

      if (pm.response.json().length > 0) {\r

      \    pm.environment.set(\"category_id\", pm.response.json()[0].id);\r

      }"
    language: text/javascript
order: 1783787289410
