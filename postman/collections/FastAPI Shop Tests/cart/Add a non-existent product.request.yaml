$kind: http-request
name: Add a non-existent product
url: "{{base_url}}/api/cart/add"
method: POST
body:
  type: json
  content: "{\r

    \  \"product_id\": 9999,\r

    \  \"quantity\": 1,\r

    \  \"cart\": {}\r

    }"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 404\", function () {\r

      \    pm.response.to.have.status(404);\r

      });\r

      \r

      pm.test(\"Error message is correct\", function () {\r

      \    var jsonData = pm.response.json();\r

      \    pm.expect(jsonData.detail).to.eql(\"Product with id 9999 not found\");\r

      });"
    language: text/javascript
