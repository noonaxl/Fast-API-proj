$kind: http-request
name: Add product to cart
url: "{{base_url}}/api/cart/add"
method: POST
body:
  type: json
  content: "{\r

    \  \"product_id\": 1,\r

    \  \"quantity\": 2,\r

    \  \"cart\": {}\r

    }"
scripts:
  - type: beforeRequest
    code: ""
    language: text/javascript
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Cart contains added product\", function () {\r

      \    var jsonData = pm.response.json();\r

      \    pm.expect(jsonData.cart).to.have.property('1');\r

      \    pm.expect(jsonData.cart['1']).to.eql(2);\r

      });\r

      \r

      // Сохраняем корзину для следующих запросов\r

      pm.environment.set(\"cart\", JSON.stringify(pm.response.json().cart));"
    language: text/javascript
