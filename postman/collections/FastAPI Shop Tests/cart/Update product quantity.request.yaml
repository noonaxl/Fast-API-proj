$kind: http-request
name: Update product quantity
url: "{{base_url}}/api/cart/update"
method: PUT
body:
  type: json
  content: "{\r

    \  \"product_id\": 1,\r

    \  \"quantity\": 5,\r

    \  \"cart\": {\r

    \    \"1\": 2,\r

    \    \"2\": 1\r

    \  }\r

    }"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Quantity was updated\", function () {\r

      \    var jsonData = pm.response.json();\r

      \    pm.expect(jsonData.cart['1']).to.eql(5);\r

      });"
    language: text/javascript
