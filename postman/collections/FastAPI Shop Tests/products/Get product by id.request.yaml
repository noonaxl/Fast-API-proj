$kind: http-request
name: Get product by id
url: "{{base_url}}/api/products/{{product_id}}"
method: GET
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Product has all required fields\", function () {\r

      \    var jsonData = pm.response.json();\r

      \    pm.expect(jsonData).to.have.property('id');\r

      \    pm.expect(jsonData).to.have.property('name');\r

      \    pm.expect(jsonData).to.have.property('price');\r

      \    pm.expect(jsonData).to.have.property('category_id');\r

      \    pm.expect(jsonData).to.have.property('category');\r

      });\r

      \r

      pm.test(\"Price is positive number\", function () {\r

      \    var jsonData = pm.response.json();\r

      \    pm.expect(jsonData.price).to.be.above(0);\r

      });"
    language: text/javascript
order: 491391202277920
